name: "docusaurus-en"
services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "3001:3000"
    volumes:
      - .:/opt/docusaurus
      - node_modules_en:/opt/docusaurus/node_modules
      - build_en:/opt/docusaurus/build
    environment:
      - NODE_ENV=development
      - DOCS_LOCALE=en  # 英文
    command: >
      sh -c "npm install && npm run start -- --host 0.0.0.0 --poll 1000 --locale $${DOCS_LOCALE}"

volumes:
  node_modules_en:
  build_en:
